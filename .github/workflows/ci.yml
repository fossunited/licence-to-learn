name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Each check runs inside the pinned shell.nix, identical to local dev.
      - name: Validate data (CSV ↔ JSON Schema)
        run: nix-shell --run "just check-data"
      - name: Lint (TOML / CSS / Markdown / spelling)
        run: nix-shell --run "just lint"
      - name: Check links
        run: nix-shell --run "zola check"
      - name: Build + HTML check (links / alt / anchors)
        run: nix-shell --run "just check-html"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # Deploy only if `checks` is green, and only on main.
  deploy:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
