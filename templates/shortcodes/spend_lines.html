{# All institutes on one line chart. One child per institute; chart.js draws
   the lines and an interactive abbreviated legend that isolates one.
   {{ spend_lines(csv="data/costs.csv") }} #}
{% set data = load_data(path=csv) %}
<figure class="multichart-fig">
  <figcaption>Yearly software spend, all responding institutes. Hover or focus a label to isolate one.</figcaption>
  <div class="multichart" data-labels="2020-21,2021-22,2022-23,2023-24,2024-25"
       role="img" aria-label="Yearly software spend for all institutes">
    {% for row in data.records %}
      <span data-name="{{ row[0] }}"
            data-values="{{ row[1] }},{{ row[2] }},{{ row[3] }},{{ row[4] }},{{ row[5] }}"></span>
    {% endfor %}
  </div>
</figure>
