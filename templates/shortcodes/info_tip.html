{# Inline "?" info tip. Use next to a heading to caveat/explain it.
   {{ info_tip(text="This is a caveat about the heading it sits next to.") }} #}
<span class="info-tip">
  <button type="button" class="info-tip__btn" aria-expanded="false" aria-label="More info">?</button>
  <span class="info-tip__panel" role="tooltip" hidden>{{ text | markdown(inline=true) | safe }}</span>
</span>
